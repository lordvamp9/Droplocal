<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>XP Drop - Mobile</title>
  <meta name="description" content="XP Drop Mobile - Send and receive files from your PC instantly. Retro Windows XP style.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1A5CB8">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E📱%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="./css/xp-core.css">
  <link rel="stylesheet" href="./css/animations.css">
  <link rel="stylesheet" href="./css/mobile.css">
</head>
<body class="xp-mobile">

  <div class="mobile-statusbar">
    <span class="statusbar-title">XP Drop</span>
    <div class="statusbar-indicators">
      <span id="statusWifi"></span>
      <span id="statusBattery"></span>
      <span id="statusClock" style="font-size:11px;font-weight:600">12:00</span>
    </div>
  </div>

  <div class="mobile-content" id="viewLoading">
    <div class="mobile-loading">
      <div class="spinner"></div>
      <p>Connecting to PC...</p>
      <p style="font-size:12px;opacity:0.5">Establishing secure P2P connection</p>
    </div>
  </div>

  <div class="mobile-content hidden" id="viewError">
    <div class="mobile-error">
      <div class="error-icon" id="errorIcon"></div>
      <div class="error-title" id="errorTitle">Error</div>
      <div class="error-message" id="errorMessage">Something went wrong</div>
      <button class="xp-button xp-button-blue" onclick="location.reload()" style="margin-top:12px">
        Retry
      </button>
    </div>
  </div>

  <div class="mobile-content hidden" id="viewMain">

    <div class="mobile-conn-card">
      <div class="conn-card-icon" id="connIcon"></div>
      <div class="conn-card-title" id="connTitle">Connecting...</div>
      <div class="conn-card-subtitle" id="connSubtitle">Establishing connection</div>
    </div>

    <button class="mobile-send-btn" id="sendBtn" disabled>
      <span class="btn-icon" id="sendBtnIcon"></span>
      <span>Send File</span>
    </button>
    <input type="file" id="mobileFileInput" multiple hidden>

    <div id="progressContainer" class="hidden"></div>

    <div class="mobile-files-section">
      <div class="files-section-header">
        <span id="filesHeaderIcon"></span>
        <span>Received Files</span>
      </div>
      <div class="files-section-content" id="filesList">
        <div class="files-empty">
          <div id="filesEmptyIcon" style="width:40px;height:40px;margin:0 auto 8px"></div>
          <p>No files received yet</p>
          <p style="font-size:11px;color:#CCC;margin-top:4px">Files sent from PC will appear here</p>
        </div>
      </div>
    </div>

  </div>

  <div class="mobile-taskbar">
    <button class="mini-start">
      <span id="miniStartLogo" style="width:14px;height:14px;display:inline-flex"></span>
      <span>start</span>
    </button>
    <span class="taskbar-title">XP Drop Mobile</span>
    <span class="mini-clock" id="miniClock">12:00</span>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="./js/peer-manager.js?v=4"></script>
  <script src="./js/file-transfer.js?v=4"></script>
  <script src="./js/mobile-app.js?v=4"></script>
</body>
</html>
